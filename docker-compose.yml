services:
  db:
    image: postgres:16
    container_name: rgz_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  rate_service:
    build:
      context: ./rate_service
    container_name: rgz_rate_service
    environment:
      USD_RATE: ${USD_RATE}
      EUR_RATE: ${EUR_RATE}
    ports:
      - "5001:5001"

  web:
    build:
      context: ./web
    container_name: rgz_web
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      RATE_SERVICE_URL: http://rate_service:5001/rate
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      rate_service:
        condition: service_started

volumes:
  postgres_data:
