{% extends "base.html" %}

{% block content %}
<section class="auth-panel">
    <div>
        <p class="eyebrow">Пункт 2.1.2</p>
        <h1>Регистрация</h1>
        <p class="muted">Пароль сохраняется в базе данных только в виде хэша.</p>
    </div>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form class="form" action="{{ url_for('register') }}" method="post">
        <label>
            Логин
            <input name="name" type="text" minlength="3" maxlength="80" pattern="[A-Za-z0-9_]+" required>
            <span class="field-note">Латинские буквы, цифры или нижнее подчеркивание.</span>
        </label>

        <label>
            Пароль
            <input name="password" type="password" minlength="6" required>
            <span class="field-note">Минимум 6 символов, хотя бы одна буква и одна цифра.</span>
        </label>

        <button class="button" type="submit">Создать аккаунт</button>
    </form>

    <p class="muted">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
</section>
{% endblock %}
